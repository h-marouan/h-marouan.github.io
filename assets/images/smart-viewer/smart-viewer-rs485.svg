<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B111A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#121A26;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="420" fill="none" stroke="#1e2d42" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#E6EEF8" letter-spacing="0.04em">SMART VIEWER — Protocole RS485 · Trame 7 Octets</text>
  <line x1="140" y1="46" x2="760" y2="46" stroke="#1e2d42" stroke-width="1"/>

  <!-- ===== FRAME STRUCTURE ===== -->
  <text x="450" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#FF6B6B" letter-spacing="0.08em">STRUCTURE DE TRAME BINAIRE — 7 OCTETS</text>

  <!-- Frame bytes -->
  <!-- Byte 0: START -->
  <rect x="50" y="88" width="98" height="52" rx="5" fill="#1a2535" stroke="#35C2FF" stroke-width="1.5"/>
  <text x="99" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#35C2FF">BYTE 0</text>
  <text x="99" y="122" text-anchor="middle" font-size="13" font-weight="800" fill="#E6EEF8">0xAA</text>
  <text x="99" y="135" text-anchor="middle" font-size="8" fill="#8A9AB5">START</text>

  <!-- Byte 1: CMD -->
  <rect x="158" y="88" width="98" height="52" rx="5" fill="#1a2535" stroke="#00D6B5" stroke-width="1.5"/>
  <text x="207" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#00D6B5">BYTE 1</text>
  <text x="207" y="122" text-anchor="middle" font-size="13" font-weight="800" fill="#E6EEF8">CMD</text>
  <text x="207" y="135" text-anchor="middle" font-size="8" fill="#8A9AB5">Commande</text>

  <!-- Byte 2: MOTOR -->
  <rect x="266" y="88" width="98" height="52" rx="5" fill="#1a2535" stroke="#FFB347" stroke-width="1.5"/>
  <text x="315" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#FFB347">BYTE 2</text>
  <text x="315" y="122" text-anchor="middle" font-size="13" font-weight="800" fill="#E6EEF8">MOTOR</text>
  <text x="315" y="135" text-anchor="middle" font-size="8" fill="#8A9AB5">ID Moteur R/G/B/Y</text>

  <!-- Byte 3-4: STEPS -->
  <rect x="374" y="88" width="98" height="52" rx="5" fill="#1a2535" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="423" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#A78BFA">BYTE 3-4</text>
  <text x="423" y="122" text-anchor="middle" font-size="13" font-weight="800" fill="#E6EEF8">STEPS</text>
  <text x="423" y="135" text-anchor="middle" font-size="8" fill="#8A9AB5">Nombre de pas (int16)</text>

  <!-- Byte 5: DIRECTION -->
  <rect x="482" y="88" width="98" height="52" rx="5" fill="#1a2535" stroke="#00D6B5" stroke-width="1.5"/>
  <text x="531" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#00D6B5">BYTE 5</text>
  <text x="531" y="122" text-anchor="middle" font-size="13" font-weight="800" fill="#E6EEF8">DIR</text>
  <text x="531" y="135" text-anchor="middle" font-size="8" fill="#8A9AB5">Direction (0/1)</text>

  <!-- Byte 6: CHECKSUM -->
  <rect x="590" y="88" width="98" height="52" rx="5" fill="#1a2535" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="639" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#FF6B6B">BYTE 6</text>
  <text x="639" y="122" text-anchor="middle" font-size="13" font-weight="800" fill="#E6EEF8">CHK</text>
  <text x="639" y="135" text-anchor="middle" font-size="8" fill="#8A9AB5">XOR checksum</text>

  <!-- ACK -->
  <rect x="730" y="88" width="110" height="52" rx="5" fill="#1a2535" stroke="#35C2FF" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="785" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#35C2FF">RÉPONSE</text>
  <text x="785" y="122" text-anchor="middle" font-size="13" font-weight="800" fill="#E6EEF8">ACK/NAK</text>
  <text x="785" y="135" text-anchor="middle" font-size="8" fill="#8A9AB5">Acquittement Pico W</text>

  <!-- Arrow from CHK to ACK -->
  <line x1="688" y1="114" x2="730" y2="114" stroke="#35C2FF" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="725,109 730,114 725,119" fill="#35C2FF"/>

  <!-- ===== COMMUNICATION FLOW ===== -->
  <text x="450" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="#00D6B5" letter-spacing="0.08em">FLUX DE COMMUNICATION — RPi5 ↔ Pico W</text>

  <!-- RPi5 node -->
  <rect x="30" y="200" width="160" height="70" rx="8" fill="#1a2535" stroke="#35C2FF" stroke-width="1.5"/>
  <text x="110" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#35C2FF">Raspberry Pi 5</text>
  <text x="110" y="238" text-anchor="middle" font-size="9" fill="#8A9AB5">RS485Controller.py</text>
  <text x="110" y="252" text-anchor="middle" font-size="9" fill="#8A9AB5">UART · pyserial</text>
  <text x="110" y="264" text-anchor="middle" font-size="8" fill="#35C2FF">send_command() + retry</text>

  <!-- MAX485 Left -->
  <rect x="220" y="214" width="90" height="42" rx="6" fill="#0d1e30" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="265" y="232" text-anchor="middle" font-size="10" font-weight="700" fill="#FF6B6B">MAX485</text>
  <text x="265" y="246" text-anchor="middle" font-size="8.5" fill="#8A9AB5">UART→RS485</text>
  <text x="265" y="257" text-anchor="middle" font-size="7.5" fill="#8A9AB5">74HCT245N</text>

  <!-- Cable -->
  <rect x="330" y="220" width="210" height="30" rx="4" fill="#1e2d42" stroke="#FF6B6B" stroke-width="1.5"/>
  <line x1="330" y1="228" x2="540" y2="228" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="8,4"/>
  <line x1="330" y1="242" x2="540" y2="242" stroke="#FF6B6B" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="435" y="238" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FF6B6B">Câble blindé RS485 — 8m</text>

  <!-- MAX485 Right -->
  <rect x="550" y="214" width="90" height="42" rx="6" fill="#0d1e30" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="595" y="232" text-anchor="middle" font-size="10" font-weight="700" fill="#FF6B6B">MAX485</text>
  <text x="595" y="246" text-anchor="middle" font-size="8.5" fill="#8A9AB5">RS485→UART</text>
  <text x="595" y="257" text-anchor="middle" font-size="7.5" fill="#8A9AB5">120Ω term.</text>

  <!-- Pico W node -->
  <rect x="660" y="200" width="210" height="70" rx="8" fill="#1a2535" stroke="#00D6B5" stroke-width="1.5"/>
  <text x="765" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#00D6B5">Raspberry Pi Pico W</text>
  <text x="765" y="238" text-anchor="middle" font-size="9" fill="#8A9AB5">pico_motor_controller.py</text>
  <text x="765" y="252" text-anchor="middle" font-size="9" fill="#8A9AB5">MicroPython · UART0</text>
  <text x="765" y="264" text-anchor="middle" font-size="8" fill="#00D6B5">ACK auto + 4× TB6600</text>

  <!-- Arrows -->
  <line x1="190" y1="235" x2="220" y2="235" stroke="#35C2FF" stroke-width="1.5"/>
  <polygon points="215,230 220,235 215,240" fill="#35C2FF"/>
  <line x1="310" y1="235" x2="330" y2="235" stroke="#FF6B6B" stroke-width="1.5"/>
  <polygon points="325,230 330,235 325,240" fill="#FF6B6B"/>
  <line x1="540" y1="235" x2="550" y2="235" stroke="#FF6B6B" stroke-width="1.5"/>
  <polygon points="545,230 550,235 545,240" fill="#FF6B6B"/>
  <line x1="640" y1="235" x2="660" y2="235" stroke="#00D6B5" stroke-width="1.5"/>
  <polygon points="655,230 660,235 655,240" fill="#00D6B5"/>

  <!-- ACK return arrow -->
  <path d="M765,270 Q765,300 435,300 Q265,300 110,270" fill="none" stroke="#35C2FF" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="115,265 110,270 117,273" fill="#35C2FF"/>
  <rect x="380" y="290" width="100" height="20" rx="4" fill="#0B111A"/>
  <text x="430" y="304" text-anchor="middle" font-size="9" fill="#35C2FF">ACK / NAK + retry</text>

  <!-- Features box -->
  <rect x="30" y="340" width="840" height="60" rx="8" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <text x="450" y="360" text-anchor="middle" font-size="10.5" font-weight="700" fill="#00D6B5" letter-spacing="0.06em">CARACTÉRISTIQUES PROTOCOLE</text>
  <text x="170" y="380" text-anchor="middle" font-size="9.5" fill="#8A9AB5">⚡ Trame 7 octets</text>
  <text x="170" y="393" text-anchor="middle" font-size="9.5" fill="#35C2FF">Binaire · XOR checksum</text>
  <text x="340" y="380" text-anchor="middle" font-size="9.5" fill="#8A9AB5">🔄 Acquittement</text>
  <text x="340" y="393" text-anchor="middle" font-size="9.5" fill="#35C2FF">ACK/NAK + retry auto</text>
  <text x="510" y="380" text-anchor="middle" font-size="9.5" fill="#8A9AB5">🛡 Résistance EMI</text>
  <text x="510" y="393" text-anchor="middle" font-size="9.5" fill="#35C2FF">120Ω · câble blindé · 8m</text>
  <text x="700" y="380" text-anchor="middle" font-size="9.5" fill="#8A9AB5">🎯 4 canaux</text>
  <text x="700" y="393" text-anchor="middle" font-size="9.5" fill="#35C2FF">R · G · B · Y indépendants</text>
</svg>
