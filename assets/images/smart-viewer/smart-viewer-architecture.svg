<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B111A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#121A26;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rpiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2535;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1e30;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="picoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2535;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1e30;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="520" fill="none" stroke="#1e2d42" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#E6EEF8" letter-spacing="0.05em">SMART VIEWER v4.2 — Architecture Globale</text>
  <line x1="160" y1="48" x2="740" y2="48" stroke="#1e2d42" stroke-width="1"/>

  <!-- === RPi5 Box === -->
  <rect x="30" y="70" width="380" height="390" rx="10" fill="url(#rpiGrad)" stroke="#35C2FF" stroke-width="1.5"/>
  <rect x="30" y="70" width="380" height="32" rx="10" fill="#35C2FF" fill-opacity="0.15"/>
  <text x="220" y="91" text-anchor="middle" font-size="13" font-weight="700" fill="#35C2FF" letter-spacing="0.06em">RASPBERRY Pi 5 — Contrôleur Principal</text>

  <!-- CameraApp -->
  <rect x="55" y="118" width="150" height="44" rx="6" fill="#1e2d42" stroke="#35C2FF" stroke-width="1"/>
  <text x="130" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#35C2FF">CameraApp</text>
  <text x="130" y="150" text-anchor="middle" font-size="9" fill="#8A9AB5">PyQt5 GUI · 1920×1080</text>

  <!-- CameraManager -->
  <rect x="215" y="118" width="170" height="44" rx="6" fill="#1e2d42" stroke="#35C2FF" stroke-width="1"/>
  <text x="300" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#35C2FF">CameraManager</text>
  <text x="300" y="150" text-anchor="middle" font-size="9" fill="#8A9AB5">Picamera2 · IMX519 · 20 FPS</text>

  <!-- LED Controller -->
  <rect x="55" y="178" width="150" height="44" rx="6" fill="#1e2d42" stroke="#00D6B5" stroke-width="1"/>
  <text x="130" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#00D6B5">LED Controller</text>
  <text x="130" y="210" text-anchor="middle" font-size="9" fill="#8A9AB5">WS2812B ×16 · SPI GPIO 10</text>

  <!-- FramerateCalc -->
  <rect x="215" y="178" width="170" height="44" rx="6" fill="#1e2d42" stroke="#00D6B5" stroke-width="1"/>
  <text x="300" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#00D6B5">FramerateCalculator</text>
  <text x="300" y="210" text-anchor="middle" font-size="9" fill="#8A9AB5">Pulse → FPS sync · GPIO 25</text>

  <!-- GpioHandler -->
  <rect x="55" y="238" width="150" height="44" rx="6" fill="#1e2d42" stroke="#8A9AB5" stroke-width="1"/>
  <text x="130" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#8A9AB5">GpioHandler</text>
  <text x="130" y="270" text-anchor="middle" font-size="9" fill="#8A9AB5">Capteur impulsion · GPIO 25</text>

  <!-- RS485 Controller -->
  <rect x="215" y="238" width="170" height="44" rx="6" fill="#1e2d42" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="300" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#FF6B6B">RS485Controller</text>
  <text x="300" y="270" text-anchor="middle" font-size="9" fill="#8A9AB5">UART · MAX485 · 9600 baud</text>

  <!-- Local motor -->
  <rect x="55" y="298" width="150" height="44" rx="6" fill="#1e2d42" stroke="#8A9AB5" stroke-width="1"/>
  <text x="130" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#8A9AB5">Moteur Local</text>
  <text x="130" y="330" text-anchor="middle" font-size="9" fill="#8A9AB5">PWM GPIO 12 · caméra</text>

  <!-- Multithreading label -->
  <rect x="55" y="358" width="330" height="34" rx="6" fill="#35C2FF" fill-opacity="0.07" stroke="#35C2FF" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="220" y="379" text-anchor="middle" font-size="9.5" fill="#35C2FF">Multithreading strict : UI · Traitement Image · Commandes Moteur</text>

  <!-- Peripheral icons -->
  <rect x="55" y="408" width="90" height="34" rx="5" fill="#0d1e30" stroke="#35C2FF" stroke-width="0.8"/>
  <text x="100" y="422" text-anchor="middle" font-size="9" fill="#35C2FF">📷 IMX519</text>
  <text x="100" y="434" text-anchor="middle" font-size="8" fill="#8A9AB5">Camera</text>

  <rect x="155" y="408" width="90" height="34" rx="5" fill="#0d1e30" stroke="#00D6B5" stroke-width="0.8"/>
  <text x="200" y="422" text-anchor="middle" font-size="9" fill="#00D6B5">💡 LED Ring</text>
  <text x="200" y="434" text-anchor="middle" font-size="8" fill="#8A9AB5">WS2812B</text>

  <rect x="255" y="408" width="130" height="34" rx="5" fill="#0d1e30" stroke="#8A9AB5" stroke-width="0.8"/>
  <text x="320" y="422" text-anchor="middle" font-size="9" fill="#8A9AB5">🖥 Écran Tactile</text>
  <text x="320" y="434" text-anchor="middle" font-size="8" fill="#8A9AB5">PyQt5 Interface</text>

  <!-- === RS485 CABLE === -->
  <!-- Arrow from RS485Controller to cable -->
  <line x1="385" y1="260" x2="520" y2="260" stroke="#FF6B6B" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="515,255 525,260 515,265" fill="#FF6B6B"/>
  <!-- Cable label -->
  <rect x="400" y="245" width="115" height="28" rx="5" fill="#0B111A" stroke="#FF6B6B" stroke-width="0.8"/>
  <text x="457" y="258" text-anchor="middle" font-size="9" font-weight="700" fill="#FF6B6B">RS485 · Câble blindé</text>
  <text x="457" y="268" text-anchor="middle" font-size="8" fill="#8A9AB5">8m · EMI · MAX485</text>

  <!-- === PICO W Box === -->
  <rect x="490" y="180" width="310" height="250" rx="10" fill="url(#picoGrad)" stroke="#00D6B5" stroke-width="1.5"/>
  <rect x="490" y="180" width="310" height="32" rx="10" fill="#00D6B5" fill-opacity="0.15"/>
  <text x="645" y="201" text-anchor="middle" font-size="13" font-weight="700" fill="#00D6B5" letter-spacing="0.05em">RASPBERRY Pi Pico W</text>

  <!-- pico_motor_controller -->
  <rect x="515" y="226" width="260" height="44" rx="6" fill="#1e2d42" stroke="#00D6B5" stroke-width="1"/>
  <text x="645" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#00D6B5">pico_motor_controller.py</text>
  <text x="645" y="258" text-anchor="middle" font-size="9" fill="#8A9AB5">MicroPython · Protocole binaire 7 octets + checksum</text>

  <!-- TB6600 drivers -->
  <rect x="515" y="286" width="260" height="44" rx="6" fill="#1e2d42" stroke="#FFB347" stroke-width="1"/>
  <text x="645" y="304" text-anchor="middle" font-size="10" font-weight="700" fill="#FFB347">4× Drivers TB6600</text>
  <text x="645" y="318" text-anchor="middle" font-size="9" fill="#8A9AB5">Courant 4A · Microstepping</text>

  <!-- 4 motors -->
  <rect x="515" y="346" width="260" height="68" rx="6" fill="#1e2d42" stroke="#E6EEF8" stroke-width="0.8"/>
  <text x="645" y="364" text-anchor="middle" font-size="10" font-weight="700" fill="#E6EEF8">4× Moteurs NEMA23</text>
  <text x="645" y="378" text-anchor="middle" font-size="9" fill="#8A9AB5">Rouge · Vert · Bleu · Jaune</text>
  <text x="645" y="392" text-anchor="middle" font-size="9" fill="#35C2FF">Correction repérage couleur R/G/B/Y</text>

  <!-- Arrow from drivers to motors -->
  <line x1="645" y1="330" x2="645" y2="346" stroke="#FFB347" stroke-width="1.5"/>
  <polygon points="640,341 645,346 650,341" fill="#FFB347"/>

  <!-- Arrow from pico_motor to tb6600 -->
  <line x1="645" y1="270" x2="645" y2="286" stroke="#00D6B5" stroke-width="1.5"/>
  <polygon points="640,281 645,286 650,281" fill="#00D6B5"/>

  <!-- Legend -->
  <rect x="30" y="476" width="840" height="32" rx="6" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <circle cx="58" cy="492" r="5" fill="#35C2FF"/>
  <text x="68" y="496" font-size="9" fill="#8A9AB5">Python (RPi5)</text>
  <circle cx="160" cy="492" r="5" fill="#00D6B5"/>
  <text x="170" y="496" font-size="9" fill="#8A9AB5">MicroPython (Pico W)</text>
  <circle cx="295" cy="492" r="5" fill="#FF6B6B"/>
  <text x="305" y="496" font-size="9" fill="#8A9AB5">RS485 · UART · MAX485</text>
  <circle cx="440" cy="492" r="5" fill="#FFB347"/>
  <text x="450" y="496" font-size="9" fill="#8A9AB5">TB6600 · NEMA23</text>
  <circle cx="565" cy="492" r="5" fill="#E6EEF8"/>
  <text x="575" y="496" font-size="9" fill="#8A9AB5">Correction couleur R/G/B/Y</text>
  <text x="840" y="496" text-anchor="end" font-size="8.5" fill="#1e2d42" font-style="italic">Smart Viewer v4.2</text>
</svg>
