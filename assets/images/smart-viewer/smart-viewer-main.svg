<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0d1b2a"/>
  <!-- Screen frame -->
  <rect x="80" y="50" width="640" height="300" rx="12" fill="#121A26" stroke="#35C2FF" stroke-width="2"/>
  <!-- Camera icon top-right -->
  <rect x="600" y="70" width="100" height="70" rx="8" fill="#1e2a3a" stroke="#00D6B5" stroke-width="1.5"/>
  <circle cx="650" cy="105" r="22" fill="none" stroke="#00D6B5" stroke-width="2"/>
  <circle cx="650" cy="105" r="12" fill="#00D6B5" opacity="0.4"/>
  <!-- Color bars -->
  <rect x="100" y="200" width="40" height="130" rx="4" fill="#e53935" opacity="0.85"/>
  <rect x="155" y="220" width="40" height="110" rx="4" fill="#43a047" opacity="0.85"/>
  <rect x="210" y="180" width="40" height="150" rx="4" fill="#1e88e5" opacity="0.85"/>
  <rect x="265" y="210" width="40" height="120" rx="4" fill="#fdd835" opacity="0.85"/>
  <!-- Inspection lines -->
  <line x1="350" y1="80" x2="350" y2="330" stroke="#35C2FF" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Motor diagram -->
  <circle cx="500" cy="200" r="50" fill="none" stroke="#35C2FF" stroke-width="2" opacity="0.7"/>
  <circle cx="500" cy="200" r="30" fill="none" stroke="#00D6B5" stroke-width="1.5" opacity="0.7"/>
  <line x1="500" y1="150" x2="500" y2="200" stroke="#35C2FF" stroke-width="2"/>
  <line x1="500" y1="200" x2="540" y2="230" stroke="#35C2FF" stroke-width="2"/>
  <!-- Labels -->
  <text x="400" y="385" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" fill="#35C2FF" font-weight="bold">Smart Viewer v4.1</text>
  <text x="400" y="410" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9AA9C0">Système d'inspection &amp; correction couleur temps réel</text>
  <!-- RS485 label -->
  <text x="500" y="270" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#00D6B5">RS485</text>
  <!-- TODO: Replace with actual screenshot of Smart Viewer application -->
</svg>
