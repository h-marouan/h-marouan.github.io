<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B111A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#121A26;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="480" fill="none" stroke="#1e2d42" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#E6EEF8" letter-spacing="0.04em">SMART VIEWER — PCB Hardware Conçus sous Altium Designer</text>
  <line x1="120" y1="46" x2="780" y2="46" stroke="#1e2d42" stroke-width="1"/>

  <!-- PCB 1: pcb-camera -->
  <rect x="30" y="66" width="195" height="360" rx="10" fill="#1a2535" stroke="#35C2FF" stroke-width="1.5"/>
  <!-- PCB visual -->
  <rect x="45" y="78" width="165" height="110" rx="6" fill="#0a2a0a" stroke="#2d6a2d" stroke-width="1.5"/>
  <!-- PCB traces -->
  <line x1="60" y1="95" x2="160" y2="95" stroke="#2d8a2d" stroke-width="1.5"/>
  <line x1="60" y1="110" x2="130" y2="110" stroke="#2d8a2d" stroke-width="1"/>
  <line x1="130" y1="110" x2="130" y2="130" stroke="#2d8a2d" stroke-width="1"/>
  <line x1="160" y1="95" x2="160" y2="140" stroke="#2d8a2d" stroke-width="1"/>
  <line x1="60" y1="140" x2="195" y2="140" stroke="#2d8a2d" stroke-width="1.5"/>
  <line x1="80" y1="125" x2="80" y2="155" stroke="#c8a000" stroke-width="1"/>
  <line x1="80" y1="155" x2="195" y2="155" stroke="#c8a000" stroke-width="1"/>
  <!-- IMX519 chip -->
  <rect x="85" y="98" width="36" height="36" rx="3" fill="#1a1a2a" stroke="#35C2FF" stroke-width="1"/>
  <text x="103" y="113" text-anchor="middle" font-size="7" fill="#35C2FF" font-weight="700">IMX</text>
  <text x="103" y="124" text-anchor="middle" font-size="7" fill="#35C2FF">519</text>
  <!-- Connector -->
  <rect x="160" y="98" width="30" height="20" rx="2" fill="#333" stroke="#8A9AB5" stroke-width="0.8"/>
  <text x="175" y="111" text-anchor="middle" font-size="6.5" fill="#8A9AB5">CSI</text>
  <!-- LED driver IC -->
  <rect x="65" y="130" width="28" height="20" rx="2" fill="#1a1a2a" stroke="#00D6B5" stroke-width="1"/>
  <text x="79" y="143" text-anchor="middle" font-size="6.5" fill="#00D6B5">LED</text>

  <text x="127" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#35C2FF">PCB-CAMERA</text>
  <text x="127" y="222" text-anchor="middle" font-size="9" fill="#8A9AB5">Carte caméra principale</text>

  <rect x="45" y="235" width="165" height="100" rx="6" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <text x="127" y="255" text-anchor="middle" font-size="9" fill="#8A9AB5">• Capteur IMX519 (1920×1080)</text>
  <text x="127" y="270" text-anchor="middle" font-size="9" fill="#8A9AB5">• Connecteur CSI Raspberry Pi 5</text>
  <text x="127" y="285" text-anchor="middle" font-size="9" fill="#8A9AB5">• Driver LED WS2812B (SPI)</text>
  <text x="127" y="300" text-anchor="middle" font-size="9" fill="#8A9AB5">• Protections ESD</text>
  <text x="127" y="315" text-anchor="middle" font-size="9" fill="#8A9AB5">• Filtrage alimentation 3.3V</text>

  <rect x="45" y="350" width="165" height="62" rx="6" fill="#35C2FF" fill-opacity="0.07" stroke="#35C2FF" stroke-width="0.8"/>
  <text x="127" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#35C2FF">Altium Designer</text>
  <text x="127" y="382" text-anchor="middle" font-size="8.5" fill="#8A9AB5">4 couches · 2 faces</text>
  <text x="127" y="396" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Rendu 3D validé</text>

  <!-- PCB 2: dc-motor-controller -->
  <rect x="240" y="66" width="195" height="360" rx="10" fill="#1a2535" stroke="#00D6B5" stroke-width="1.5"/>
  <!-- PCB visual -->
  <rect x="255" y="78" width="165" height="110" rx="6" fill="#0a1a2a" stroke="#0d4a7a" stroke-width="1.5"/>
  <!-- Traces -->
  <line x1="270" y1="100" x2="370" y2="100" stroke="#0d6aaa" stroke-width="1.5"/>
  <line x1="270" y1="115" x2="290" y2="115" stroke="#0d6aaa" stroke-width="1"/>
  <line x1="290" y1="115" x2="290" y2="145" stroke="#0d6aaa" stroke-width="1"/>
  <line x1="370" y1="100" x2="370" y2="135" stroke="#0d6aaa" stroke-width="1"/>
  <line x1="270" y1="145" x2="410" y2="145" stroke="#0d6aaa" stroke-width="1.5"/>
  <line x1="310" y1="120" x2="310" y2="160" stroke="#c8a000" stroke-width="1"/>
  <!-- TB6600 footprint -->
  <rect x="280" y="103" width="50" height="40" rx="3" fill="#1a1a2a" stroke="#FFB347" stroke-width="1"/>
  <text x="305" y="118" text-anchor="middle" font-size="7.5" fill="#FFB347" font-weight="700">TB6600</text>
  <text x="305" y="130" text-anchor="middle" font-size="7" fill="#8A9AB5">driver</text>
  <!-- MAX485 -->
  <rect x="345" y="103" width="40" height="30" rx="2" fill="#1a1a2a" stroke="#FF6B6B" stroke-width="1"/>
  <text x="365" y="121" text-anchor="middle" font-size="7" fill="#FF6B6B">MAX485</text>

  <text x="337" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#00D6B5">DC-MOTOR-CTRL</text>
  <text x="337" y="222" text-anchor="middle" font-size="9" fill="#8A9AB5">Contrôleur LED + Moteur</text>

  <rect x="255" y="235" width="165" height="100" rx="6" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <text x="337" y="255" text-anchor="middle" font-size="9" fill="#8A9AB5">• Driver TB6600 (moteur local)</text>
  <text x="337" y="270" text-anchor="middle" font-size="9" fill="#8A9AB5">• Transceiver MAX485</text>
  <text x="337" y="285" text-anchor="middle" font-size="9" fill="#8A9AB5">• Convertisseur 74HCT245N</text>
  <text x="337" y="300" text-anchor="middle" font-size="9" fill="#8A9AB5">• Alimentation 24V → 5V/3.3V</text>
  <text x="337" y="315" text-anchor="middle" font-size="9" fill="#8A9AB5">• Connecteurs moteur NEMA23</text>

  <rect x="255" y="350" width="165" height="62" rx="6" fill="#00D6B5" fill-opacity="0.07" stroke="#00D6B5" stroke-width="0.8"/>
  <text x="337" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#00D6B5">Altium Designer</text>
  <text x="337" y="382" text-anchor="middle" font-size="8.5" fill="#8A9AB5">4 couches · blindage EMI</text>
  <text x="337" y="396" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Testée 24V / 4A</text>

  <!-- PCB 3: 2in1-flex-board -->
  <rect x="450" y="66" width="195" height="360" rx="10" fill="#1a2535" stroke="#A78BFA" stroke-width="1.5"/>
  <!-- PCB visual - flex -->
  <rect x="465" y="78" width="165" height="110" rx="6" fill="#1a0a1a" stroke="#5a2a7a" stroke-width="1.5"/>
  <!-- Flex board traces (curved) -->
  <path d="M 480 95 Q 520 90 550 100 Q 580 110 610 95" fill="none" stroke="#8a4aaa" stroke-width="1.5"/>
  <path d="M 480 115 Q 510 108 540 115 Q 570 122 600 115" fill="none" stroke="#8a4aaa" stroke-width="1"/>
  <path d="M 480 130 Q 525 140 560 130 Q 590 122 615 130" fill="none" stroke="#c8a000" stroke-width="1"/>
  <!-- Components -->
  <rect x="490" y="98" width="35" height="28" rx="3" fill="#1a1a2a" stroke="#A78BFA" stroke-width="1"/>
  <text x="507" y="113" text-anchor="middle" font-size="7" fill="#A78BFA">GPIO</text>
  <text x="507" y="124" text-anchor="middle" font-size="6.5" fill="#8A9AB5">ctrl</text>
  <rect x="560" y="98" width="35" height="28" rx="3" fill="#1a1a2a" stroke="#A78BFA" stroke-width="1"/>
  <text x="577" y="113" text-anchor="middle" font-size="7" fill="#A78BFA">PWM</text>
  <text x="577" y="124" text-anchor="middle" font-size="6.5" fill="#8A9AB5">GPIO12</text>

  <text x="547" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#A78BFA">2IN1-FLEX-BOARD</text>
  <text x="547" y="222" text-anchor="middle" font-size="9" fill="#8A9AB5">Carte flex combinée</text>

  <rect x="465" y="235" width="165" height="100" rx="6" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <text x="547" y="255" text-anchor="middle" font-size="9" fill="#8A9AB5">• Contrôle GPIO multi-canal</text>
  <text x="547" y="270" text-anchor="middle" font-size="9" fill="#8A9AB5">• PWM GPIO 12 (moteur cam)</text>
  <text x="547" y="285" text-anchor="middle" font-size="9" fill="#8A9AB5">• Capteur impulsion GPIO 25</text>
  <text x="547" y="300" text-anchor="middle" font-size="9" fill="#8A9AB5">• Format flex (économie espace)</text>
  <text x="547" y="315" text-anchor="middle" font-size="9" fill="#8A9AB5">• Connecteurs ribbon</text>

  <rect x="465" y="350" width="165" height="62" rx="6" fill="#A78BFA" fill-opacity="0.07" stroke="#A78BFA" stroke-width="0.8"/>
  <text x="547" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#A78BFA">Altium Designer</text>
  <text x="547" y="382" text-anchor="middle" font-size="8.5" fill="#8A9AB5">PCB flex 2 couches</text>
  <text x="547" y="396" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Faible encombrement</text>

  <!-- PCB 4: GPIO et Moteur-control -->
  <rect x="660" y="66" width="210" height="360" rx="10" fill="#1a2535" stroke="#FFB347" stroke-width="1.5"/>
  <!-- PCB visual -->
  <rect x="675" y="78" width="180" height="110" rx="6" fill="#1a1200" stroke="#5a4a00" stroke-width="1.5"/>
  <!-- Traces -->
  <line x1="690" y1="95" x2="840" y2="95" stroke="#8a7a00" stroke-width="1.5"/>
  <line x1="690" y1="110" x2="720" y2="110" stroke="#8a7a00" stroke-width="1"/>
  <line x1="720" y1="110" x2="720" y2="140" stroke="#8a7a00" stroke-width="1"/>
  <line x1="840" y1="95" x2="840" y2="130" stroke="#8a7a00" stroke-width="1"/>
  <line x1="690" y1="148" x2="840" y2="148" stroke="#8a7a00" stroke-width="1.5"/>
  <!-- 4x TB6600 slots -->
  <rect x="695" y="98" width="30" height="25" rx="2" fill="#1a1a2a" stroke="#FFB347" stroke-width="0.8"/>
  <text x="710" y="114" text-anchor="middle" font-size="6" fill="#FFB347">TB#1</text>
  <rect x="733" y="98" width="30" height="25" rx="2" fill="#1a1a2a" stroke="#FFB347" stroke-width="0.8"/>
  <text x="748" y="114" text-anchor="middle" font-size="6" fill="#FFB347">TB#2</text>
  <rect x="771" y="98" width="30" height="25" rx="2" fill="#1a1a2a" stroke="#FFB347" stroke-width="0.8"/>
  <text x="786" y="114" text-anchor="middle" font-size="6" fill="#FFB347">TB#3</text>
  <rect x="809" y="98" width="30" height="25" rx="2" fill="#1a1a2a" stroke="#FFB347" stroke-width="0.8"/>
  <text x="824" y="114" text-anchor="middle" font-size="6" fill="#FFB347">TB#4</text>
  <!-- Text labels for motors -->
  <text x="710" y="131" text-anchor="middle" font-size="6" fill="#8A9AB5">R</text>
  <text x="748" y="131" text-anchor="middle" font-size="6" fill="#8A9AB5">G</text>
  <text x="786" y="131" text-anchor="middle" font-size="6" fill="#8A9AB5">B</text>
  <text x="824" y="131" text-anchor="middle" font-size="6" fill="#8A9AB5">Y</text>

  <text x="765" y="206" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFB347">GPIO MOTOR-CONTROL</text>
  <text x="765" y="222" text-anchor="middle" font-size="9" fill="#8A9AB5">Carte contrôle GPIO/moteur</text>

  <rect x="675" y="235" width="180" height="100" rx="6" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <text x="765" y="255" text-anchor="middle" font-size="9" fill="#8A9AB5">• 4× Drivers TB6600 (RVBY)</text>
  <text x="765" y="270" text-anchor="middle" font-size="9" fill="#8A9AB5">• Pico W GPIO interface</text>
  <text x="765" y="285" text-anchor="middle" font-size="9" fill="#8A9AB5">• Alimentation 24V moteurs</text>
  <text x="765" y="300" text-anchor="middle" font-size="9" fill="#8A9AB5">• 4× Connecteurs NEMA23</text>
  <text x="765" y="315" text-anchor="middle" font-size="9" fill="#8A9AB5">• Résistances terminaison 120Ω</text>

  <rect x="675" y="350" width="180" height="62" rx="6" fill="#FFB347" fill-opacity="0.07" stroke="#FFB347" stroke-width="0.8"/>
  <text x="765" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#FFB347">Altium Designer</text>
  <text x="765" y="382" text-anchor="middle" font-size="8.5" fill="#8A9AB5">4 couches · haute puissance</text>
  <text x="765" y="396" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Testée 24V / 4A × 4</text>

  <!-- Bottom bar -->
  <rect x="30" y="440" width="840" height="28" rx="6" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <text x="450" y="458" text-anchor="middle" font-size="9.5" fill="#8A9AB5">4 PCB sur mesure conçus intégralement avec Altium Designer · Modélisation 3D STEP · Fichiers Gerber pour fabrication</text>
</svg>
