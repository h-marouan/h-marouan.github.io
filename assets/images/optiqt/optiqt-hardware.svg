<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B111A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#121A26;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" fill="url(#bgGrad)" rx="12"/>
  <rect width="900" height="440" fill="none" stroke="#1e2d42" stroke-width="1.5" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#E6EEF8" letter-spacing="0.04em">OPTIQT — Pilotage CNC · Communication Série Arduino UNO</text>
  <line x1="150" y1="46" x2="750" y2="46" stroke="#1e2d42" stroke-width="1"/>

  <!-- ===== RPi / PC Application ===== -->
  <rect x="30" y="62" width="220" height="280" rx="10" fill="#1a2535" stroke="#35C2FF" stroke-width="1.5"/>
  <rect x="30" y="62" width="220" height="30" rx="10" fill="#35C2FF" fill-opacity="0.2"/>
  <text x="140" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#35C2FF">APPLICATION OptiQt</text>
  <text x="140" y="95" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Raspberry Pi / PC · Python</text>

  <!-- PyQt6 GUI -->
  <rect x="50" y="106" width="180" height="44" rx="6" fill="#121A26" stroke="#A78BFA" stroke-width="1"/>
  <text x="140" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="#A78BFA">PyQt6 Interface</text>
  <text x="140" y="138" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Image + Contours + G-code viewer</text>

  <!-- motion_controller -->
  <rect x="50" y="162" width="180" height="44" rx="6" fill="#121A26" stroke="#FFB347" stroke-width="1"/>
  <text x="140" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#FFB347">motion_controller</text>
  <text x="140" y="194" text-anchor="middle" font-size="8.5" fill="#8A9AB5">G28 Homing · G1 Déplacements</text>

  <!-- serial_interface -->
  <rect x="50" y="218" width="180" height="44" rx="6" fill="#121A26" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="140" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="#FF6B6B">serial_interface</text>
  <text x="140" y="250" text-anchor="middle" font-size="8.5" fill="#8A9AB5">PySerial · COM3 · 9600 baud</text>

  <!-- Simulation mode -->
  <rect x="50" y="276" width="180" height="40" rx="6" fill="#35C2FF" fill-opacity="0.07" stroke="#35C2FF" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="140" y="294" text-anchor="middle" font-size="9" fill="#35C2FF">SIMULATION_MODE = True</text>
  <text x="140" y="307" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Test sans machine physique · Mock</text>

  <!-- ===== Serial Cable ===== -->
  <rect x="280" y="210" width="130" height="42" rx="6" fill="#0d1e30" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="345" y="228" text-anchor="middle" font-size="10" font-weight="700" fill="#FF6B6B">Câble USB/Série</text>
  <text x="345" y="242" text-anchor="middle" font-size="8.5" fill="#8A9AB5">PySerial · COM3 · 9600 baud</text>

  <!-- arrows app → cable -->
  <line x1="230" y1="231" x2="280" y2="231" stroke="#FF6B6B" stroke-width="1.5"/>
  <polygon points="275,226 280,231 275,236" fill="#FF6B6B"/>

  <!-- arrow cable → arduino -->
  <line x1="410" y1="231" x2="460" y2="231" stroke="#FF6B6B" stroke-width="1.5"/>
  <polygon points="455,226 460,231 455,236" fill="#FF6B6B"/>

  <!-- ===== Arduino UNO ===== -->
  <rect x="460" y="62" width="200" height="300" rx="10" fill="#1a2535" stroke="#00D6B5" stroke-width="1.5"/>
  <rect x="460" y="62" width="200" height="30" rx="10" fill="#00D6B5" fill-opacity="0.2"/>
  <text x="560" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#00D6B5">ARDUINO UNO</text>

  <!-- Arduino chip visual -->
  <rect x="490" y="100" width="140" height="90" rx="6" fill="#0a1a00" stroke="#2d5a00" stroke-width="1.5"/>
  <!-- MCU chip -->
  <rect x="520" y="115" width="80" height="60" rx="4" fill="#1a2a00" stroke="#4a8a00" stroke-width="1"/>
  <text x="560" y="140" text-anchor="middle" font-size="9" fill="#4aaa00" font-weight="700">ATmega328P</text>
  <text x="560" y="154" text-anchor="middle" font-size="8" fill="#8A9AB5">16 MHz</text>
  <text x="560" y="166" text-anchor="middle" font-size="8" fill="#8A9AB5">32KB Flash</text>
  <!-- USB port -->
  <rect x="492" y="128" width="22" height="14" rx="2" fill="#333" stroke="#666" stroke-width="0.8"/>
  <text x="503" y="138" text-anchor="middle" font-size="6" fill="#999">USB</text>
  <!-- GPIO pins -->
  <line x1="490" y1="178" x2="490" y2="185" stroke="#4aaa00" stroke-width="1"/>
  <line x1="500" y1="178" x2="500" y2="185" stroke="#4aaa00" stroke-width="1"/>
  <line x1="510" y1="178" x2="510" y2="185" stroke="#4aaa00" stroke-width="1"/>
  <line x1="520" y1="178" x2="520" y2="185" stroke="#4aaa00" stroke-width="1"/>
  <line x1="610" y1="178" x2="610" y2="185" stroke="#4aaa00" stroke-width="1"/>
  <line x1="620" y1="178" x2="620" y2="185" stroke="#4aaa00" stroke-width="1"/>

  <!-- G-code parser -->
  <rect x="480" y="206" width="160" height="40" rx="6" fill="#121A26" stroke="#00D6B5" stroke-width="1"/>
  <text x="560" y="222" text-anchor="middle" font-size="9.5" font-weight="700" fill="#00D6B5">G-code Parser</text>
  <text x="560" y="235" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Interprète G28, G1, M3, M5</text>

  <!-- Step controller -->
  <rect x="480" y="256" width="160" height="40" rx="6" fill="#121A26" stroke="#FFB347" stroke-width="1"/>
  <text x="560" y="272" text-anchor="middle" font-size="9.5" font-weight="700" fill="#FFB347">Stepper Controller</text>
  <text x="560" y="285" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Axes X/Y/Z · Vitesse broche</text>

  <!-- Spindle control -->
  <rect x="480" y="306" width="160" height="40" rx="6" fill="#121A26" stroke="#8A9AB5" stroke-width="1"/>
  <text x="560" y="322" text-anchor="middle" font-size="9.5" font-weight="700" fill="#8A9AB5">Spindle M3/M5</text>
  <text x="560" y="335" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Broche CNC · Enable/Disable</text>

  <!-- Arrow arduino → CNC -->
  <line x1="660" y1="231" x2="710" y2="231" stroke="#00D6B5" stroke-width="1.5"/>
  <polygon points="705,226 710,231 705,236" fill="#00D6B5"/>

  <!-- ===== CNC Machine ===== -->
  <rect x="710" y="62" width="160" height="300" rx="10" fill="#1a2535" stroke="#FFB347" stroke-width="1.5"/>
  <rect x="710" y="62" width="160" height="30" rx="10" fill="#FFB347" fill-opacity="0.2"/>
  <text x="790" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#FFB347">MACHINE CNC</text>

  <!-- CNC visual representation -->
  <rect x="730" y="100" width="120" height="90" rx="6" fill="#0a0800" stroke="#4a3800" stroke-width="1"/>
  <!-- Frame -->
  <rect x="745" y="110" width="90" height="70" rx="2" fill="none" stroke="#6a5800" stroke-width="1.5"/>
  <!-- Tool head -->
  <circle cx="790" cy="145" r="12" fill="#1a1200" stroke="#8a7800" stroke-width="1.5"/>
  <line x1="790" y1="133" x2="790" y2="157" stroke="#FFB347" stroke-width="1.5"/>
  <text x="790" y="175" text-anchor="middle" font-size="8" fill="#FFB347">🔧 Outil</text>
  <!-- Axes labels -->
  <text x="745" y="195" font-size="8" fill="#8A9AB5">X</text>
  <line x1="753" y1="191" x2="820" y2="191" stroke="#8A9AB5" stroke-width="0.8"/>
  <polygon points="817,188 820,191 817,194" fill="#8A9AB5"/>
  <text x="840" y="160" font-size="8" fill="#8A9AB5">Y</text>
  <line x1="838" y1="148" x2="838" y2="180" stroke="#8A9AB5" stroke-width="0.8"/>
  <polygon points="835,151 838,148 841,151" fill="#8A9AB5"/>

  <!-- 3 profiles -->
  <rect x="725" y="210" width="130" height="36" rx="5" fill="#121A26" stroke="#FFB347" stroke-width="0.8"/>
  <text x="790" y="225" text-anchor="middle" font-size="8.5" font-weight="700" fill="#FFB347">3 Profils Matériaux</text>
  <text x="790" y="239" text-anchor="middle" font-size="8" fill="#8A9AB5">Minéral · PC · CR39</text>

  <rect x="725" y="256" width="130" height="36" rx="5" fill="#121A26" stroke="#8A9AB5" stroke-width="0.8"/>
  <text x="790" y="271" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Vitesse broche</text>
  <text x="790" y="285" text-anchor="middle" font-size="8" fill="#35C2FF">S1000–S3000 RPM</text>

  <rect x="725" y="302" width="130" height="36" rx="5" fill="#121A26" stroke="#8A9AB5" stroke-width="0.8"/>
  <text x="790" y="317" text-anchor="middle" font-size="8.5" fill="#8A9AB5">Profondeur de passe</text>
  <text x="790" y="331" text-anchor="middle" font-size="8" fill="#35C2FF">0.1–0.5mm / passe</text>

  <!-- Pytest note -->
  <rect x="30" y="360" width="840" height="60" rx="8" fill="#121A26" stroke="#1e2d42" stroke-width="1"/>
  <text x="450" y="380" text-anchor="middle" font-size="10.5" font-weight="700" fill="#35C2FF" letter-spacing="0.06em">🧪 TESTABILITÉ — Architecture Mock Injectable</text>
  <text x="225" y="400" text-anchor="middle" font-size="9" fill="#8A9AB5">serial_interface</text>
  <text x="225" y="413" text-anchor="middle" font-size="9" fill="#35C2FF">remplacé par Mock Pytest</text>
  <text x="450" y="400" text-anchor="middle" font-size="9" fill="#8A9AB5">Tests unitaires Pytest</text>
  <text x="450" y="413" text-anchor="middle" font-size="9" fill="#35C2FF">sans machine physique</text>
  <text x="680" y="400" text-anchor="middle" font-size="9" fill="#8A9AB5">Bugs détectés + corrigés</text>
  <text x="680" y="413" text-anchor="middle" font-size="9" fill="#35C2FF">précision G-code améliorée</text>
</svg>
