<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0B111A"/>

  <!-- CPU chip body -->
  <rect x="18" y="18" width="28" height="28" rx="4" fill="#1a2535" stroke="#35C2FF" stroke-width="1.5"/>

  <!-- Inner chip core -->
  <rect x="23" y="23" width="18" height="18" rx="2" fill="#121A26" stroke="#00D6B5" stroke-width="1"/>

  <!-- Circuit grid lines inside core -->
  <line x1="27" y1="23" x2="27" y2="41" stroke="#35C2FF" stroke-width="0.5" opacity="0.5"/>
  <line x1="32" y1="23" x2="32" y2="41" stroke="#35C2FF" stroke-width="0.5" opacity="0.5"/>
  <line x1="37" y1="23" x2="37" y2="41" stroke="#35C2FF" stroke-width="0.5" opacity="0.5"/>
  <line x1="23" y1="27" x2="41" y2="27" stroke="#35C2FF" stroke-width="0.5" opacity="0.5"/>
  <line x1="23" y1="32" x2="41" y2="32" stroke="#35C2FF" stroke-width="0.5" opacity="0.5"/>
  <line x1="23" y1="37" x2="41" y2="37" stroke="#35C2FF" stroke-width="0.5" opacity="0.5"/>

  <!-- AI text in center -->
  <text x="32" y="35" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="8" fill="#00D6B5">AI</text>

  <!-- Left pins -->
  <rect x="13" y="22" width="5" height="2.5" rx="1" fill="#35C2FF"/>
  <rect x="13" y="27" width="5" height="2.5" rx="1" fill="#35C2FF"/>
  <rect x="13" y="32" width="5" height="2.5" rx="1" fill="#35C2FF"/>
  <rect x="13" y="37" width="5" height="2.5" rx="1" fill="#35C2FF"/>

  <!-- Right pins -->
  <rect x="46" y="22" width="5" height="2.5" rx="1" fill="#35C2FF"/>
  <rect x="46" y="27" width="5" height="2.5" rx="1" fill="#35C2FF"/>
  <rect x="46" y="32" width="5" height="2.5" rx="1" fill="#35C2FF"/>
  <rect x="46" y="37" width="5" height="2.5" rx="1" fill="#35C2FF"/>

  <!-- Top pins -->
  <rect x="22" y="13" width="2.5" height="5" rx="1" fill="#00D6B5"/>
  <rect x="27" y="13" width="2.5" height="5" rx="1" fill="#00D6B5"/>
  <rect x="32" y="13" width="2.5" height="5" rx="1" fill="#00D6B5"/>
  <rect x="37" y="13" width="2.5" height="5" rx="1" fill="#00D6B5"/>

  <!-- Bottom pins -->
  <rect x="22" y="46" width="2.5" height="5" rx="1" fill="#00D6B5"/>
  <rect x="27" y="46" width="2.5" height="5" rx="1" fill="#00D6B5"/>
  <rect x="32" y="46" width="2.5" height="5" rx="1" fill="#00D6B5"/>
  <rect x="37" y="46" width="2.5" height="5" rx="1" fill="#00D6B5"/>

  <!-- Corner notch -->
  <circle cx="20" cy="20" r="2" fill="#35C2FF" opacity="0.6"/>
</svg>
