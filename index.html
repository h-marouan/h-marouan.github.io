<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marwan | Ingénieur Génie Électrique & IA Industrielle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0B111A;
            --surface: #121A26;
            --text: #E6EEF8;
            --primary: #35C2FF;
            --accent: #00D6B5;
            --muted: #9AA9C0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #0B111A 0%, #1a2a40 100%);
            border-bottom: 2px solid var(--surface);
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        header p {
            font-size: 1.2rem;
            color: var(--muted);
            max-width: 600px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin-bottom: 40px;
            font-size: 1.8rem;
        }

        /* Grille de projets */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, border 0.3s ease;
            border: 1px solid transparent;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .project-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #1e2a3a;
        }

        .project-content {
            padding: 20px;
        }

        .project-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            background: rgba(53, 194, 255, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: var(--primary);
            color: var(--bg);
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--accent);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .social-links a {
            color: var(--text);
            font-size: 1.5rem;
            margin: 0 15px;
            transition: 0.3s;
        }

        .social-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <header>
        <h1>Marouan</h1>
        <p>Ingénieur Chef d'Équipe @ Rototeca | Expert en Systèmes Embarqués, IA Industrielle & Vision par Ordinateur</p>
        <div class="social-links" style="margin-top: 20px;">
